<header class="crop-header">
  <div><span>Foto de perfil</span><h2>Encuadrá tu foto</h2></div>
  <button mat-icon-button type="button" mat-dialog-close aria-label="Cerrar editor"><mat-icon>close</mat-icon></button>
</header>
<mat-dialog-content>
  <div class="crop-stage">
    <canvas #cropCanvas aria-label="Vista previa circular de la foto" (pointerdown)="onPointerDown($event)" (pointermove)="onPointerMove($event)" (pointerup)="onPointerUp($event)" (pointercancel)="onPointerUp($event)" (wheel)="onWheel($event)"></canvas>
    <span class="crop-ring" aria-hidden="true"></span>
    @if (isPreparing()) { <span class="loading-label">Preparando imagen...</span> }
  </div>
  <p class="gesture-help"><mat-icon>touch_app</mat-icon> Arrastrá para centrar. Usá dos dedos o el control para acercar.</p>
  <label class="zoom-control"><mat-icon>image</mat-icon><input type="range" min="1" max="4" step="0.05" [value]="zoom()" (input)="onZoomInput($event)" aria-label="Zoom de la foto"><mat-icon>zoom_in</mat-icon></label>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button type="button" (click)="reset()">Recentrar</button><span></span>
  <button mat-button type="button" mat-dialog-close>Cancelar</button>
  <button mat-flat-button type="button" (click)="apply()" [disabled]="isPreparing()"><mat-icon>check</mat-icon>Usar foto</button>
</mat-dialog-actions>
